const TONE3_MAP={'├в':'╟О','├┤':'╟Т','├╗':'╟Ф','├к':'─Ы','├о':'╟Р','├В':'╟О','├Ф':'╟Т','├Ы':'╟Ф','├К':'─Ы','├О':'╟Р'};
function norm(s){return s.split('').map(c=>TONE3_MAP[c]||c).join('').trim().toLowerCase().replace(/\s+/g,' ');}
function speak(text){const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';speechSynthesis.cancel();speechSynthesis.speak(u);}

  {label:"Babak 1",range:"1тАУ25",color:"#6366f1",nos:[...Array(25)].map((_,i)=>i)},

  browse:{q:''}

function h(tag,attrs){
  const e=document.createElement(tag);
  const ch=Array.from(arguments).slice(2).flat(99);
  if(attrs) for(const[k,v] of Object.entries(attrs)){
    if(k==='style') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className') e.className=v;
    else if(k==='disabled') e.disabled=v;
    else e.setAttribute(k,v);
  }
  for(const c of ch){if(c==null)continue;e.appendChild(typeof c==='string'?document.createTextNode(c):c);}
  return e;
}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  const tabs=[['flash','ЁЯЧВя╕П','Flashcard'],['quiz','ЁЯОп','Kuis'],['browse','ЁЯУЛ','Daftar']];
  const tabBar=h('div',{style:{display:'flex',background:'rgba(255,255,255,0.8)',borderRadius:'18px',padding:'4px',gap:'4px',marginBottom:'20px',boxShadow:'0 2px 12px rgba(99,102,241,0.08)'}},
    ...tabs.map(([id,ic,lb])=>{
      const active=ST.tab===id;
      const btn=h('button',{style:{flex:'1',padding:'10px 8px',borderRadius:'14px',border:'none',background:active?'linear-gradient(135deg,#6366f1,#8b5cf6)':'transparent',color:active?'#fff':'#94a3b8',fontWeight:'700',fontSize:'13px',transition:'all 0.2s',boxShadow:active?'0 2px 8px rgba(99,102,241,0.3)':'none'},onClick:()=>{ST.tab=id;render();}},
        h('span',{style:{display:'block',fontSize:'16px'}},ic),lb);
      return btn;
    })
  );
  let content;
  if(ST.tab==='flash') content=flashView();
  else if(ST.tab==='quiz') content=quizView();
  else content=browseView();
  app.appendChild(h('div',{style:{minHeight:'100vh',paddingBottom:'80px'}},
    h('div',{style:{maxWidth:'480px',margin:'0 auto',padding:'20px 16px 0'}},
      h('div',{style:{textAlign:'center',marginBottom:'20px'}},
        h('h1',{style:{fontSize:'22px',fontWeight:'900',color:'#1e1b4b',margin:'0'}},'ЁЯАД Hafal Pinyin'),
        h('p',{style:{color:'#94a3b8',fontSize:'13px',marginTop:'2px'}},'No. 1тАУ100 ┬╖ Pinyin тЖФ Bahasa Indonesia')
      ),
      tabBar,content
    )
  ));
}

    h('span',{style:{fontSize:f.dir==='id2pin'?'28px':'30px',fontWeight:'800',color:'#1e1b4b',textAlign:'center',lineHeight:'1.3'}},f.dir==='id2pin'?item.id:item.pinyin),

    h('span',{style:{fontSize:'10px',fontWeight:'800',color:c,letterSpacing:'2px',textTransform:'uppercase',marginBottom:'12px'}},f.dir==='id2pin'?'PINYIN':'BAHASA INDONESIA'),

    h('span',{style:{fontSize:'12px',color:'#94a3b8',marginTop:'12px'}},`No. ${item.no}`)

  cardWrap.appendChild(inner);

            );return btn;

  }
  if(q.done){
    const pct=Math.round((q.score/q.qs.length)*100);
    const emoji=pct>=80?'ЁЯПЖ':pct>=60?'ЁЯСН':'ЁЯТк';
    const msg=pct>=80?'Luar biasa! Sudah hafal!':pct>=60?'Bagus! Terus berlatih!':'Semangat, ulangi lagi!';
    const c=pct>=80?'#10b981':pct>=60?'#f59e0b':'#ef4444';
    return h('div',{style:{maxWidth:'480px',margin:'0 auto',paddingBottom:'32px'}},
      h('div',{style:{background:'#fff',borderRadius:'24px',padding:'28px',textAlign:'center',marginBottom:'16px',boxShadow:'0 8px 40px rgba(99,102,241,0.12)'}},
        h('div',{style:{fontSize:'52px',marginBottom:'8px'}},emoji),
        h('h2',{style:{fontSize:'20px',fontWeight:'800',color:'#1e1b4b',margin:'0 0 4px'}},msg),
        h('p',{style:{color:'#94a3b8',fontSize:'13px',marginBottom:'20px'}},'Kuis selesai!'),
        h('div',{style:{background:`${c}10`,border:`1.5px solid ${c}25`,borderRadius:'20px',padding:'20px 16px',marginBottom:'20px'}},
          h('p',{style:{fontSize:'11px',fontWeight:'800',color:c,letterSpacing:'2px',margin:'0 0 4px'}},'SKOR AKHIR'),
          h('div',{style:{fontSize:'56px',fontWeight:'900',color:c,lineHeight:'1'}},`${pct}`,h('span',{style:{fontSize:'20px',color:`${c}88`,fontWeight:'700'}},'/100')),
          h('p',{style:{fontSize:'13px',color:'#64748b',marginTop:'6px'}},`${q.score} benar dari ${q.qs.length} soal`)
        ),
        h('button',{style:{width:'100%',padding:'14px',background:`linear-gradient(135deg,${c},${c}cc)`,border:'none',borderRadius:'14px',color:'#fff',fontWeight:'800',fontSize:'14px'},onClick:()=>{ST.quiz.setup=true;render();}},'ЁЯФД Ulangi Kuis')
      ),
      q.wrongs.length>0?h('div',{style:{background:'rgba(255,255,255,0.8)',borderRadius:'20px',padding:'16px'}},
        h('p',{style:{fontSize:'11px',fontWeight:'800',color:'#ef4444',letterSpacing:'1px',marginBottom:'10px'}},`тЪая╕П PERLU DIULANG (${q.wrongs.length})`),
        h('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}},
          ...q.wrongs.map((w)=>h('div',{style:{background:'rgba(255,255,255,0.9)',borderRadius:'12px',padding:'10px 14px',border:'1px solid rgba(239,68,68,0.12)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px'}},
            h('div',{},h('span',{style:{fontSize:'14px',fontWeight:'800',color:'#dc2626',display:'block'}},w.item.pinyin),h('span',{style:{fontSize:'12px',color:'#475569'}},w.item.id)),
            h('div',{style:{textAlign:'right'}},h('span',{style:{fontSize:'11px',color:'#94a3b8'}},'Jawabanmu:'),h('span',{style:{fontSize:'12px',color:'#ef4444',display:'block',fontWeight:'700'}},w.user||'(kosong)'))
          ))
        )
      ):null
    );
  }

  const item=VOCAB[q.qs[q.qi]];
  const d=q.dir==='random'?q.curDir:q.dir;
  const pct2=Math.round((q.qi/q.qs.length)*100);
  const fbColor=q.correct===null?null:q.correct?'#10b981':'#ef4444';
  const fbBg=q.correct===null?null:q.correct?'#f0fdf4':'#fef2f2';

  const inp=document.createElement('input');
  inp.type='text';
  inp.value=q.ans;
  inp.disabled=q.answered;
  inp.placeholder=q.mode==='audio'||d==='id2pin'?'Ketik pinyin...':'Ketik terjemahan bahasa Indonesia...';
  inp.autocomplete='off';inp.autocorrect='off';inp.autocapitalize='off';inp.spellcheck=false;
  Object.assign(inp.style,{width:'100%',padding:'14px 16px',borderRadius:'16px',fontSize:'17px',fontWeight:'600',border:`2px solid ${q.answered?(q.correct?'#10b981':'#ef4444'):'#e2e8f0'}`,background:q.answered?(q.correct?'#f0fdf4':'#fef2f2'):'#fff',color:q.answered?(q.correct?'#065f46':'#991b1b'):'#1e1b4b',outline:'none',transition:'all 0.2s',boxSizing:'border-box'});
  inp.addEventListener('input',e=>{ST.quiz.ans=e.target.value;});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){if(!ST.quiz.answered)doCheck();else doNext();}});
  setTimeout(()=>{if(!q.answered)inp.focus();},50);

  function doCheck(){
    if(ST.quiz.answered)return;
    const qz=ST.quiz;const curItem=VOCAB[qz.qs[qz.qi]];
    const dir=qz.mode==='audio'?'id2pin':(qz.dir==='random'?(Math.random()<0.5?'id2pin':'pin2id'):qz.dir);
    ST.quiz.curDir=dir;
    const user=norm(qz.ans);
    let ok=false;
    if(dir==='id2pin'||qz.mode==='audio'){ok=user===norm(curItem.pinyin);}
    else{const alts=curItem.id.split(/[,\/]/).map(x=>norm(x));ok=alts.some(a=>user===a);}
    ST.quiz.correct=ok;ST.quiz.answered=true;
    if(ok)ST.quiz.score++;
    else ST.quiz.wrongs=[...ST.quiz.wrongs,{item:curItem,user:qz.ans,d:dir}];
    render();
  }
  function doNext(){
    const qz=ST.quiz;
    if(qz.qi+1>=qz.qs.length){ST.quiz.done=true;render();return;}
    ST.quiz.qi++;ST.quiz.ans='';ST.quiz.answered=false;ST.quiz.correct=null;
    render();
    if(ST.quiz.mode==='audio')setTimeout(()=>speak(VOCAB[ST.quiz.qs[ST.quiz.qi]].pinyin),300);
  }

  const qCard=h('div',{style:{background:'#fff',borderRadius:'24px',padding:'24px',marginBottom:'14px',border:'1.5px solid #e2e8f0',boxShadow:'0 4px 20px rgba(99,102,241,0.08)',textAlign:'center',minHeight:'140px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}});
  if(q.mode==='audio'){
    qCard.appendChild(h('p',{style:{fontSize:'11px',fontWeight:'800',color:'#6366f1',letterSpacing:'2px',marginBottom:'12px'}},'DENGARKAN тЖТ KETIK PINYIN'));
    const ab=h('button',{style:{fontSize:'56px',background:'none',border:'none',lineHeight:'1'},onClick:()=>speak(item.pinyin)},'ЁЯФК');
    qCard.appendChild(ab);
    qCard.appendChild(h('p',{style:{fontSize:'12px',color:'#94a3b8',marginTop:'8px'}},'Ketuk untuk putar ulang'));
  } else {
    qCard.appendChild(h('p',{style:{fontSize:'11px',fontWeight:'800',color:'#6366f1',letterSpacing:'2px',marginBottom:'12px'}},d==='id2pin'?'BAHASA INDONESIA тЖТ PINYIN':'PINYIN тЖТ BAHASA INDONESIA'));
    qCard.appendChild(h('p',{style:{fontSize:'28px',fontWeight:'800',color:'#1e1b4b',lineHeight:'1.3',textAlign:'center'}},d==='id2pin'?item.id:item.pinyin));
  }

  let actionRow;
  if(!q.answered){
    const checkBtn=h('button',{style:{flex:'1',padding:'14px',background:'linear-gradient(135deg,#6366f1,#8b5cf6)',border:'none',borderRadius:'14px',color:'#fff',fontWeight:'800',fontSize:'15px'},onClick:doCheck},'Cek Jawaban');
    const skipBtn=h('button',{style:{padding:'14px 16px',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:'14px',fontWeight:'700',fontSize:'14px',color:'#94a3b8'},onClick:()=>{ST.quiz.answered=true;ST.quiz.correct=false;ST.quiz.wrongs=[...ST.quiz.wrongs,{item,user:'(dilewati)',d}];render();}},'Lewati');
    actionRow=h('div',{style:{display:'flex',gap:'10px'}},checkBtn,skipBtn);
  } else {
    const nextBtn=h('button',{style:{flex:'1',padding:'14px',background:'linear-gradient(135deg,#6366f1,#8b5cf6)',border:'none',borderRadius:'14px',color:'#fff',fontWeight:'800',fontSize:'15px'},onClick:doNext},'Lanjut тЖТ');
    actionRow=h('div',{style:{display:'flex',gap:'10px'}},nextBtn);
  }

  return h('div',{style:{maxWidth:'480px',margin:'0 auto',paddingBottom:'32px',position:'relative'}},
    h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'16px'}},
      h('button',{style:{background:'none',border:'none',fontSize:'20px',padding:'4px'},onClick:()=>{ST.quiz.setup=true;render();}},'тЖР'),
      h('div',{style:{flex:'1'}},h('div',{style:{height:'6px',background:'#e2e8f0',borderRadius:'3px',overflow:'hidden'}},h('div',{style:{height:'6px',background:'linear-gradient(90deg,#6366f1,#8b5cf6)',borderRadius:'3px',width:`${pct2}%`,transition:'width 0.4s'}}))),
      h('span',{style:{fontSize:'12px',fontWeight:'700',color:'#94a3b8',whiteSpace:'nowrap'}},`${q.qi+1}/100`)
    ),
    qCard,
    h('div',{style:{marginBottom:'10px'}},inp),
    q.answered?h('div',{style:{padding:'12px 16px',borderRadius:'14px',marginBottom:'12px',background:fbBg,border:`1px solid ${fbColor}30`,display:'flex',alignItems:'flex-start',gap:'10px'}},
      h('span',{style:{fontSize:'18px'}},q.correct?'тЬЕ':'тЭМ'),
      h('div',{},
        h('p',{style:{fontSize:'13px',fontWeight:'700',color:fbColor,margin:'0'}},q.correct?'Benar!':'Salah.'),
        !q.correct?h('p',{style:{fontSize:'13px',color:'#475569',margin:'4px 0 0'}},`Jawaban: `,h('strong',{},d==='pin2id'?item.id:item.pinyin)):null
      )
    ):null,
    actionRow
  );
}

// тФАтФАтФА BROWSE тФАтФАтФА
function browseView(){
  const b=ST.browse;
  const list=b.q.trim()?VOCAB.filter(v=>v.pinyin.toLowerCase().includes(b.q.toLowerCase())||v.id.toLowerCase().includes(b.q.toLowerCase())):VOCAB;
  const inp=document.createElement('input');
  inp.type='text';inp.value=b.q;inp.placeholder='Cari pinyin atau bahasa Indonesia...';
  Object.assign(inp.style,{width:'100%',padding:'13px 16px',borderRadius:'14px',border:'1.5px solid #e2e8f0',fontSize:'15px',marginBottom:'12px',outline:'none',background:'#fff',color:'#1e1b4b',boxSizing:'border-box'});
  inp.addEventListener('input',e=>{ST.browse.q=e.target.value;render();});
  const wrap=h('div',{style:{maxWidth:'480px',margin:'0 auto',paddingBottom:'32px'}},inp,
    h('div',{style:{display:'flex',flexDirection:'column',gap:'4px'}},
      ...list.map(v=>{
        const sb=h('button',{style:{background:'none',border:'none',fontSize:'16px',color:'#6366f1',padding:'4px'},onClick:()=>speak(v.pinyin)},'ЁЯФК');
        return h('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'11px 14px',background:'rgba(255,255,255,0.7)',borderRadius:'12px',border:'1px solid rgba(99,102,241,0.08)'}},
          h('span',{style:{fontSize:'11px',color:'#cbd5e1',minWidth:'24px',fontWeight:'700'}},String(v.no)),
          h('span',{style:{fontWeight:'700',fontSize:'14px',color:'#1e1b4b',minWidth:'110px'}},v.pinyin),
          h('span',{style:{fontSize:'13px',color:'#475569',flex:'1'}},v.id),
          sb
        );
      })
    )
  );
  return wrap;
}

render();
</script>
